<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cho Chiến xin lỗi 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
}

.container {
  margin-top: 50px;
}

img {
  width: 200px;
  height: auto;
  border-radius: 15px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #999;
  color: white;
  position: relative;
}

.heart {
  position: absolute;
  color: red;
  animation: fly 3s linear infinite;
}

@keyframes fly {
  0% {transform: translateY(0);}
  100% {transform: translateY(-600px);}
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://docs.google.com/uc?export=download&id=1x2jYc_example" type="audio/mpeg">
</audio>

<div class="container">
  <h2 id="text"></h2>
  <p id="note">Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó</p>
  <img id="img" src="1.jpg"><br>

  <button class="yes" id="yesBtn">Nhi chấp nhận</button>
  <button class="no" id="noBtn">Hông đồng ý</button>
</div>

<script>
let step = 0;

let texts = [
"Nhi xinh đẹp, siêu dễ thương, cho Chiến xin lỗi nhóoo",
"Biết ngay là không chấp nhận rồi mòoo 😭",
"Cho Chiến xin lỗi đi mòoo 🥺",
"Này là lần cuối cùng rồi đó Nhi nghen 😢",
"Thôi thì cho Nhi thêm 1 lần nữa đó 😭",
"Lần cuối thật rồi nè 🥺"
];

let images = ["1.jpg","2.jpg","3.jpg","4.jpg","1.jpg","2.jpg"];

let yesSize = 18;
let noSize = 18;

const text = document.getElementById("text");
const img = document.getElementById("img");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

function update() {
  text.innerText = texts[step];
  img.src = images[step];

  yesSize += 5;
  noSize -= 2;

  yesBtn.style.fontSize = yesSize + "px";
  noBtn.style.fontSize = noSize + "px";
}

noBtn.onclick = () => {
  step++;
  if (step < texts.length) {
    update();
  }

  if (step === 5) {
    noBtn.onmouseover = () => {
      noBtn.style.position = "absolute";
      noBtn.style.top = Math.random()*window.innerHeight + "px";
      noBtn.style.left = Math.random()*window.innerWidth + "px";
    }
  }
};

yesBtn.onclick = () => {
  document.body.innerHTML = "<h1>Nhi đồng ý rồi nhá 💘<br>Nhắn tin cho Chiến đi nè 😆</h1>";
};

setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.top = "100vh";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),3000);
},300);

update();
</script>

</body>
</html>
