<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xin lỗi Nhi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    margin-top: 50px;
}

img {
    width: 230px;
    border-radius: 20px;
    margin-bottom: 20px;
}

h1 {
    color: white;
    font-size: 26px;
}

p {
    color: white;
}

button {
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
}

#no {
    background: #eee;
}

/* tim bay */
.heart {
    position: fixed;
    bottom: 0;
    animation: bay 4s linear infinite;
}

@keyframes bay {
    0% {transform: translateY(0);}
    100% {transform: translateY(-900px);}
}

/* sticker */
.sticker {
    position: fixed;
    bottom: 0;
    animation: bay 5s linear infinite;
}
</style>
</head>

<body>

<div class="container">
    <img id="img" src="1.jpg">

    <h1 id="text"></h1>
    <p>Nhi hông chọn hoặc thoát là tha lỗi cho Chiến rồi đó</p>

    <button id="yes">Nhi chấp nhận</button>
    <button id="no">Hông đồng ý</button>
</div>

<audio id="music" loop>
    <source src="music.mp3">
</audio>

<script>
let step = 1;

let texts = [
"Nhi xinh đẹp, siêu dễ thương, cho Chiến xin lỗi nhóoo",
"Biết ngay là không chấp nhận rồi mòoo 😢",
"Cho Chiến xin lỗi đi mòoo 🥺",
"Này là lần cuối cùng rồi đó Nhi nghen 😭",
"Thôi thì cho Nhi thêm 1 lần trả lời nữa đó 🥹",
"Lần cuối thật rồi nè 😭"
];

let images = [
"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"3.jpg",
"2.jpg"
];

let stickers = ["🐰","💖","🌸","🥺","💕","🎀","✨"];

let yes = document.getElementById("yes");
let no = document.getElementById("no");
let text = document.getElementById("text");
let img = document.getElementById("img");
let music = document.getElementById("music");

text.innerText = texts[0];

// bật nhạc
document.body.addEventListener("click", () => {
    music.play();
}, {once:true});

// 💖 tim bay
setInterval(()=>{
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+10)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
},300);

// 🎀 sticker random
setInterval(()=>{
    let s = document.createElement("div");
    s.className = "sticker";
    s.innerHTML = stickers[Math.floor(Math.random()*stickers.length)];
    s.style.left = Math.random()*100 + "vw";
    s.style.fontSize = (Math.random()*25+15)+"px";
    document.body.appendChild(s);

    setTimeout(()=>s.remove(),5000);
},500);

// bấm KHÔNG
no.onclick = () => {
    if(step < 6){
        step++;
        text.innerText = texts[step-1];
        img.src = images[step-1];

        yes.style.fontSize = (18 + step*4) + "px";
        no.style.fontSize = (18 - step*2) + "px";
    }

    // thoại 6 chạy loạn
    if(step === 6){
        no.style.position = "absolute";

        no.onmouseover = () => {
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 50);
            no.style.left = x + "px";
            no.style.top = y + "px";
        };
    }
};

// bấm ĐỒNG Ý
yes.onclick = () => {
    text.innerText = "Nhi đồng ý rồi nhá 💖 Giờ phải nhắn tin với Chiến đó nghen 😘";
    img.src = "4.jpg";
    yes.style.display = "none";
    no.style.display = "none";
};
</script>

</body>
</html>
